server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # index.html nunca se cachea: garantiza que el browser siempre pida la
    # versión fresca después de cada redeploy, evitando referencias a chunks
    # con hashes obsoletos (stale deployment problem).
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    # Los assets de Vite llevan hash de contenido en el nombre — se pueden
    # cachear de forma agresiva; cuando el contenido cambia, el nombre cambia.
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # SPA fallback: cualquier ruta desconocida devuelve index.html
    location / {
        try_files $uri /index.html;
    }
}