server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Permite subir logos/archivos sin que nginx corte el body.
    client_max_body_size 25m;

    # Resolver DNS embebido de Docker (127.0.0.11). Lo usamos junto con una
    # variable en proxy_pass para que nginx resuelva la IP del contenedor
    # backend en cada request — así sobrevive a reinicios del backend que
    # le cambien la IP interna (en vez de cachearla al arrancar y dar 502).
    resolver 127.0.0.11 valid=30s;

    # ─── Reverse proxy hacia el backend ──────────────────────────────────────
    # El SPA llama a rutas relativas (/api, /uploads), así que el navegador del
    # dispositivo cliente pega contra el MISMO origen del que cargó la página
    # (http://<ip-servidor>:8080). Nginx reenvía esas rutas al contenedor
    # backend por la red interna de Docker. Ventaja: no se hornea ninguna IP en
    # el bundle y solo hay que exponer/abrir un puerto (8080) en la LAN.
    location /api/ {
        set $backend_upstream http://backend:3000;
        proxy_pass $backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header X-Forwarded-Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Archivos estáticos servidos por el backend (logos en /uploads/...).
    location /uploads/ {
        set $backend_uploads http://backend:3000;
        proxy_pass $backend_uploads;
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header X-Forwarded-Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # index.html nunca se cachea: garantiza que el browser siempre pida la
    # versión fresca después de cada redeploy, evitando referencias a chunks
    # con hashes obsoletos (stale deployment problem).
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    # Los assets de Vite llevan hash de contenido en el nombre — se pueden
    # cachear de forma agresiva; cuando el contenido cambia, el nombre cambia.
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # SPA fallback: cualquier ruta desconocida devuelve index.html
    location / {
        try_files $uri /index.html;
    }
}
